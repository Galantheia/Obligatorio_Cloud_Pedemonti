<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obligatorio ISC</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Demo arquitectura e-commerce</p>
        <h1>Productos servidos desde RDS</h1>
      </section>

      <section id="server-banner" class="server-banner skeleton">
        Cargando instancia...
      </section>

      <section class="controls-card">
        <div>
          <p class="label">Grupo de productos actual</p>
          <h2 id="product-group">Cargando...</h2>
        </div>

        <button id="reset-group-btn" type="button">
          Cambiar grupo de productos
        </button>
      </section>

      <section id="products" class="products-grid" aria-live="polite"></section>

      <section id="error-box" class="error-box hidden"></section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
